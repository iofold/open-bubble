openapi: 3.1.0
info:
  title: Open Bubble API
  version: 0.1.0
  summary: Minimal contract for the local prompt MVP.
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /health:
    get:
      summary: Check server health
      responses:
        '200':
          description: Server is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /prompt:
    post:
      summary: Submit a media prompt and receive a synchronous answer
      description: Send one multipart file named `screenMedia` and at least one prompt field. The runtime accepts `image/*` and `video/*` for screen media, accepts raw `audio/*` in `promptAudio`, and forwards the audio bytes without client-side transcription. Any unsupported media type should return `415 Unsupported Media Type`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PromptRequest'
      responses:
        '200':
          description: Prompt handled synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'
        '400':
          description: Missing required media or invalid prompt payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported media type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [ok, service, version]
      properties:
        ok:
          type: boolean
        service:
          type: string
          const: open-bubble-api
        version:
          type: string
    PromptRequest:
      type: object
      required: [screenMedia]
      anyOf:
        - required: [promptText]
        - required: [promptAudio]
      properties:
        screenMedia:
          type: string
          format: binary
          description: Upload one screenshot or screen recording as an image/* or video/* file.
        promptText:
          type: string
          description: Optional text prompt sent with the uploaded screen media.
        promptAudio:
          type: string
          format: binary
          description: Optional raw audio prompt sent as audio/* and forwarded to the backend without client-side transcription.
      additionalProperties: false
    PromptMedia:
      type: object
      required: [filename, mimeType, kind]
      properties:
        filename:
          type: string
        mimeType:
          type: string
        kind:
          type: string
          enum: [image, video]
    PromptResponse:
      type: object
      required: [answer, screenMedia, receivedAt]
      properties:
        answer:
          type: string
        promptText:
          type: string
        promptAudio:
          type: object
          required: [filename, mimeType]
          properties:
            filename:
              type: string
            mimeType:
              type: string
        screenMedia:
          $ref: '#/components/schemas/PromptMedia'
        receivedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
