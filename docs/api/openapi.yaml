openapi: 3.1.0
info:
  title: Open Bubble API
  version: 0.2.0
  summary: Local screenshot-to-PR contract backed by the Codex App Server bridge.
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /health:
    get:
      summary: Check server health
      responses:
        '200':
          description: Server is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /prompt:
    post:
      summary: Submit a screenshot prompt and wait for a Codex-backed PR result
      description: Send one multipart screenshot image in `screenMedia` plus a required `promptText` field. The API infers the target repo from local config, starts a local Codex App Server turn, waits for completion, and returns the final answer plus PR metadata.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PromptRequest'
      responses:
        '200':
          description: Prompt handled synchronously and a PR was produced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'
        '400':
          description: Missing required media or invalid prompt payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported media type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Local Codex bridge could not complete the request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [ok, service, version]
      properties:
        ok:
          type: boolean
        service:
          type: string
          const: open-bubble-api
        version:
          type: string
    PromptRequest:
      type: object
      required: [screenMedia, promptText]
      properties:
        screenMedia:
          type: string
          format: binary
          description: Upload one screenshot image as an image/* file.
        promptText:
          type: string
          minLength: 1
          description: The user request that Codex should interpret alongside the screenshot.
      additionalProperties: false
    PromptMedia:
      type: object
      required: [filename, mimeType, kind]
      properties:
        filename:
          type: string
        mimeType:
          type: string
        kind:
          type: string
          enum: [image]
    PromptResponse:
      type: object
      required:
        - answer
        - branchName
        - prUrl
        - repoId
        - screenMedia
        - threadId
        - receivedAt
      properties:
        answer:
          type: string
        branchName:
          type: string
        prUrl:
          type: string
          format: uri
        promptText:
          type: string
        repoId:
          type: string
        screenMedia:
          $ref: '#/components/schemas/PromptMedia'
        threadId:
          type: string
        receivedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
