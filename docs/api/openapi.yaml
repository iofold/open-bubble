openapi: 3.1.0
info:
  title: Open Bubble API
  version: 0.1.0
  summary: Minimal contract for the local prompt MVP.
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /health:
    get:
      summary: Check server health
      responses:
        '200':
          description: Server is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /apps:
    get:
      summary: List supported apps
      responses:
        '200':
          description: Static list of apps supported by the MVP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppsResponse'
  /prompt:
    post:
      summary: Submit a media prompt and create an async task
      description: Send one multipart file named `screenMedia` and at least one prompt field. The runtime accepts `image/*` and `video/*` for screen media, accepts raw `audio/*` in `promptAudio`, and forwards the audio bytes without client-side transcription. Background processing classifies the request from the prompt plus request metadata into one of `coding_request`, `personal_context_request`, or `action_request`, and suggests relevant apps from the supported app list when appropriate. The API persists a lightweight local task, starts background classification, and returns a task id for polling. Any unsupported media type should return `415 Unsupported Media Type`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PromptRequest'
      responses:
        '202':
          description: Prompt accepted and queued for background processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptAcceptedResponse'
        '400':
          description: Missing required media or invalid prompt payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported media type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tasks/{taskId}:
    get:
      summary: Get prompt task status
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Current task state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStatusResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /context-graph:
    get:
      summary: Read a live context graph snapshot
      parameters:
        - in: query
          name: sessionId
          required: false
          schema:
            type: string
            default: sess_test_001
        - in: query
          name: connector
          required: false
          schema:
            type: string
            enum: [gmail, drive, calendar]
      responses:
        '200':
          description: Context graph snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextGraphSnapshot'
  /context-graph/stream:
    get:
      summary: Stream context graph snapshots when the graph changes
      parameters:
        - in: query
          name: sessionId
          required: false
          schema:
            type: string
            default: sess_test_001
      responses:
        '200':
          description: Server-Sent Events with `graph.snapshot` events
          content:
            text/event-stream:
              schema:
                type: string
  /context-graph/seed:
    post:
      summary: Seed the local context graph from a fixture
      responses:
        '200':
          description: Seed result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /context-graph/ingest/mcp-results:
    post:
      summary: Ingest normalized MCP connector results into the context graph
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Ingest result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /context-graph/ingest/context-request:
    post:
      summary: Ingest a frontend context request into the context graph
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Ingest result and optional graph-backed answer
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /control-panel:
    get:
      summary: Serve the local context graph control panel
      responses:
        '200':
          description: HTML control panel
          content:
            text/html:
              schema:
                type: string
components:
  schemas:
    HealthResponse:
      type: object
      required: [ok, service, version]
      properties:
        ok:
          type: boolean
        service:
          type: string
          const: open-bubble-api
        version:
          type: string
    AppName:
      type: string
      enum: [Codex, Gmail, Gcal, Slack, Notion]
    RequestType:
      type: string
      enum: [coding_request, personal_context_request, action_request]
    AppsResponse:
      type: object
      required: [apps]
      properties:
        apps:
          type: array
          items:
            $ref: '#/components/schemas/AppName'
      additionalProperties: false
    PromptRequest:
      type: object
      required: [screenMedia]
      anyOf:
        - required: [promptText]
        - required: [promptAudio]
      properties:
        screenMedia:
          type: string
          format: binary
          description: Upload one screenshot or screen recording as an image/* or video/* file.
        promptText:
          type: string
          description: Optional text prompt sent with the uploaded screen media.
        promptAudio:
          type: string
          format: binary
          description: Optional raw audio prompt sent as audio/* and forwarded to the backend without client-side transcription.
      additionalProperties: false
    PromptMedia:
      type: object
      required: [filename, mimeType, kind]
      properties:
        filename:
          type: string
        mimeType:
          type: string
        kind:
          type: string
          enum: [image, video]
      additionalProperties: false
    PromptAudio:
      type: object
      required: [filename, mimeType]
      properties:
        filename:
          type: string
        mimeType:
          type: string
      additionalProperties: false
    TaskStatus:
      type: string
      enum: [in_progress, completed, failed, error]
    PromptAcceptedResponse:
      type: object
      required: [taskId, status, createdAt, statusUrl]
      properties:
        taskId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TaskStatus'
        createdAt:
          type: string
          format: date-time
        statusUrl:
          type: string
      additionalProperties: false
    TaskResult:
      type: object
      required: [screenMedia, completedAt, classification, routingPayload]
      properties:
        answer:
          type: string
        pullRequestUrl:
          type: string
          format: uri
        branchName:
          type: string
        commitSha:
          type: string
        repoId:
          type: string
        threadId:
          type: string
        turnId:
          type: string
        promptText:
          type: string
        promptAudio:
          $ref: '#/components/schemas/PromptAudio'
        screenMedia:
          $ref: '#/components/schemas/PromptMedia'
        classification:
          $ref: '#/components/schemas/RequestClassification'
        routingPayload:
          $ref: '#/components/schemas/RoutingPayload'
        completedAt:
          type: string
          format: date-time
      additionalProperties: false
    RequestClassification:
      type: object
      required: [requestType, relevantApps, rationale]
      properties:
        requestType:
          $ref: '#/components/schemas/RequestType'
        relevantApps:
          type: array
          items:
            $ref: '#/components/schemas/AppName'
        rationale:
          type: string
          description: Short explanation grounded in the prompt and available request metadata.
      additionalProperties: false
    RoutingPayload:
      type: object
      required: [screenMedia, screenMediaPath, classification]
      properties:
        promptText:
          type: string
        promptAudio:
          $ref: '#/components/schemas/PromptAudio'
        promptAudioPath:
          type: string
        screenMedia:
          $ref: '#/components/schemas/PromptMedia'
        screenMediaPath:
          type: string
        classification:
          $ref: '#/components/schemas/RequestClassification'
        defaultCodingCwd:
          type: string
          description: Default local fallback working directory for future coding-task handoff when no dedicated execution target is available.
      additionalProperties: false
    TaskFailure:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        repoId:
          type: string
        threadId:
          type: string
        turnId:
          type: string
      additionalProperties: false
    TaskStatusResponse:
      type: object
      required: [taskId, status, createdAt, updatedAt]
      properties:
        taskId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TaskStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        repoId:
          type: string
        threadId:
          type: string
        turnId:
          type: string
        result:
          $ref: '#/components/schemas/TaskResult'
        errorDetail:
          $ref: '#/components/schemas/TaskFailure'
      additionalProperties: false
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
      additionalProperties: false
    ContextGraphSnapshot:
      type: object
      required: [sessionId, nodes, edges, episodes, stats]
      properties:
        sessionId:
          type: string
        nodes:
          type: array
          items:
            type: object
            required: [id, type, label]
            additionalProperties: true
        edges:
          type: array
          items:
            type: object
            required: [id, source, target, type, label]
            additionalProperties: true
        episodes:
          type: array
          items:
            type: object
            additionalProperties: true
        stats:
          type: object
          required: [nodeCount, edgeCount, episodeCount, chunkCount]
          additionalProperties: true
