openapi: 3.1.0
info:
  title: Open Bubble API
  version: 0.1.0
  summary: Minimal contract for the local prompt MVP.
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /health:
    get:
      summary: Check server health
      responses:
        '200':
          description: Server is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /prompt:
    post:
      summary: Submit a media prompt and receive a synchronous answer
      description: Accepts one required multipart media file and an optional text prompt. The media must be image/* or video/*.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PromptRequest'
            encoding:
              media:
                contentType: image/*,video/*
      responses:
        '200':
          description: Prompt handled synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'
        '400':
          description: Missing required media or invalid prompt payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported media type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [ok, service, version]
      properties:
        ok:
          type: boolean
        service:
          type: string
          const: open-bubble-api
        version:
          type: string
    PromptRequest:
      type: object
      required: [media]
      properties:
        media:
          type: string
          format: binary
          description: Upload an image/* or video/* file.
        prompt:
          type: string
          description: Optional user prompt to accompany the media upload.
      additionalProperties: false
    PromptMedia:
      type: object
      required: [filename, mimeType, kind]
      properties:
        filename:
          type: string
        mimeType:
          type: string
          description: The uploaded file MIME type.
        kind:
          type: string
          enum: [image, video]
    PromptResponse:
      type: object
      required: [answer, media, receivedAt]
      properties:
        answer:
          type: string
          description: Synchronous answer returned by the local API.
        prompt:
          type: string
          description: Echoes the submitted prompt when one is provided.
        media:
          $ref: '#/components/schemas/PromptMedia'
        receivedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
