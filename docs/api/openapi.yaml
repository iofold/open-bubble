openapi: 3.1.0
info:
  title: Open Bubble API
  version: 0.1.0
  summary: Minimal contract for the local prompt MVP.
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /health:
    get:
      summary: Check server health
      responses:
        '200':
          description: Server is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /prompt:
    post:
      summary: Submit a media prompt and create an async task
      description: Send one multipart file named `screenMedia` and at least one prompt field. The runtime accepts `image/*` and `video/*` for screen media, accepts raw `audio/*` in `promptAudio`, and forwards the audio bytes without client-side transcription. The API persists a lightweight local task, starts background processing, and returns a task id for polling. Any unsupported media type should return `415 Unsupported Media Type`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PromptRequest'
      responses:
        '202':
          description: Prompt accepted and queued for background processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptAcceptedResponse'
        '400':
          description: Missing required media or invalid prompt payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported media type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tasks/{taskId}:
    get:
      summary: Get prompt task status
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Current task state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStatusResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [ok, service, version]
      properties:
        ok:
          type: boolean
        service:
          type: string
          const: open-bubble-api
        version:
          type: string
    PromptRequest:
      type: object
      required: [screenMedia]
      anyOf:
        - required: [promptText]
        - required: [promptAudio]
      properties:
        screenMedia:
          type: string
          format: binary
          description: Upload one screenshot or screen recording as an image/* or video/* file.
        promptText:
          type: string
          description: Optional text prompt sent with the uploaded screen media.
        promptAudio:
          type: string
          format: binary
          description: Optional raw audio prompt sent as audio/* and forwarded to the backend without client-side transcription.
      additionalProperties: false
    PromptMedia:
      type: object
      required: [filename, mimeType, kind]
      properties:
        filename:
          type: string
        mimeType:
          type: string
        kind:
          type: string
          enum: [image, video]
      additionalProperties: false
    PromptAudio:
      type: object
      required: [filename, mimeType]
      properties:
        filename:
          type: string
        mimeType:
          type: string
      additionalProperties: false
    TaskStatus:
      type: string
      enum: [in_progress, completed, failed, error]
    PromptAcceptedResponse:
      type: object
      required: [taskId, status, createdAt, statusUrl]
      properties:
        taskId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TaskStatus'
        createdAt:
          type: string
          format: date-time
        statusUrl:
          type: string
      additionalProperties: false
    TaskResult:
      type: object
      required: [screenMedia, completedAt]
      properties:
        answer:
          type: string
        pullRequestUrl:
          type: string
          format: uri
        promptText:
          type: string
        promptAudio:
          $ref: '#/components/schemas/PromptAudio'
        screenMedia:
          $ref: '#/components/schemas/PromptMedia'
        completedAt:
          type: string
          format: date-time
      additionalProperties: false
    TaskFailure:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
      additionalProperties: false
    TaskStatusResponse:
      type: object
      required: [taskId, status, createdAt, updatedAt]
      properties:
        taskId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TaskStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        result:
          $ref: '#/components/schemas/TaskResult'
        errorDetail:
          $ref: '#/components/schemas/TaskFailure'
      additionalProperties: false
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
      additionalProperties: false
