services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      OPEN_BUBBLE_CONTEXT_DB: /data/context.duckdb
      OPEN_BUBBLE_CONTROL_PANEL_DIST: /app/apps/control-panel/dist
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      COMPOSIO_USER_ID: ${COMPOSIO_USER_ID:-}
      OPEN_BUBBLE_COMPOSIO_USER_ID: ${OPEN_BUBBLE_COMPOSIO_USER_ID:-}
      OPEN_BUBBLE_COMPOSIO_MCP_URL: ${OPEN_BUBBLE_COMPOSIO_MCP_URL:-}
      OPEN_BUBBLE_COMPOSIO_MCP_HEADERS: ${OPEN_BUBBLE_COMPOSIO_MCP_HEADERS:-}
      OPEN_BUBBLE_COMPOSIO_MCP_TOKEN: ${OPEN_BUBBLE_COMPOSIO_MCP_TOKEN:-}
    volumes:
      - open-bubble-data:/data

  control-panel:
    image: node:25-bookworm-slim
    profiles: ["dev"]
    working_dir: /workspace/apps/control-panel
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_OPEN_BUBBLE_API_BASE_URL: http://localhost:3000
    volumes:
      - .:/workspace
    depends_on:
      - api

volumes:
  open-bubble-data:
